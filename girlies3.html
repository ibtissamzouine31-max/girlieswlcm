<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Message pour mes copines</title>
    <style>
        body {
            background-color: #FFC0CB; /* fond rose */
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }

        h1 {
            color: #FF1493; /* texte rose foncé */
            font-size: 36px;
        }

        .hearts {
            font-size: 50px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>Les filles 💖 Je vous aime tous ! 💖</h1>
    <p>Manal, Ghita et Hiba, prenez soin de vous 💕💕💕</p>
    <div class="hearts">❤️❤️❤️❤️❤️</div>
</body>
</html>
